<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard - Counselling App</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ADMIN DASHBOARD -->
<div id="pgAdminDashboard" class="page active">
  <div class="topbar">
    <div class="brand"><div class="logo">🎓</div><span class="brand-name">Admin Dashboard</span></div>
    <div class="topbar-right">
      <div class="user-pill">👤<span id="aDTopName"></span></div>
      <button class="btn-ghost" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  
  <div class="admain">
    <div class="asection">
      <div class="ashdr">
        <h2>Manage Participants</h2>
        <span class="cbadge" id="aPCount">0 participants</span>
      </div>
      
      <div class="acontrols">
        <div class="asearch">
          <input type="text" id="aSearch" placeholder="Search by name, email..." onkeyup="filterParticipants()">
        </div>
        <div class="abtngroup">
          <button class="btn-p" id="aSelectAllBtn" onclick="toggleSelectAll()" style="min-width:140px;">
            Select All
          </button>
          <button class="btn-p" id="aAssignBtn" onclick="openTestAssignmentModal()" style="min-width:140px;opacity:0.55;cursor:not-allowed;" disabled>
            Assign Test
          </button>
        </div>
      </div>

      <div class="atable-wrapper">
        <table class="atable" id="participantTable">
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
              <th>Name</th>
              <th>Email</th>
              <th>Mobile</th>
              <th>Institution</th>
              <th>Logins</th>
            </tr>
          </thead>
          <tbody id="participantTableBody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--sub);">Loading participants...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Test Assignment Modal -->
<div class="overlay" id="testModalOverlay">
  <div class="mbox" style="max-width:500px;">
    <h3>Assign Test to Participants</h3>
    <div class="msg" id="testModalMsg"></div>
    
    <div class="test-list" id="testList">
      <div class="ldr"></div>
    </div>
    
    <p style="font-size:.8rem;color:var(--sub);margin:12px 0;">Select a test to assign to <strong id="selectedCountLabel">0</strong> participant(s)</p>
    
    <div class="mbtns">
      <button class="bn bprev" style="border:1.5px solid var(--border);" onclick="closeTestAssignmentModal()">Cancel</button>
      <button class="bn" id="assignConfirmBtn" style="background:linear-gradient(135deg,var(--sky),var(--indigo));color:#fff;padding:9px 20px;opacity:0.55;cursor:not-allowed;" disabled onclick="confirmTestAssignment()">Assign Selected Test</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
